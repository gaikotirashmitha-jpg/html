<!DOCTYPE html>
<html>
<head>
    <title>Time Table</title>

    <style>
        table{
            border-collapse: collapse;
            width: 980px;
            margin: 40px auto;
        }

        th,td{
            border:1px solid black;
            width:150px;
            height:45px;
            padding-left:12px;
            font-size:24px;
        }

        th{
            text-align:center;
        }

        .hours{
            width:180px;
            text-align:center;
            vertical-align:middle;
        }

        .lunch{
            text-align:center;
        }

        .title{
            height:60px;
            font-size:30px;
        }
    </style>

</head>
<body>

<table>

    <tr>
        <th colspan="6" class="title">Time Table</th>
    </tr>

    <tr>
        <th rowspan="6" class="hours">Hours</th>
        <th>Mon</th>
        <th>Tue</th>
        <th>Wed</th>
        <th>Thu</th>
        <th>Fri</th>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
        <td>Arts</td>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
        <td>Arts</td>
    </tr>

    <tr>
        <th colspan="5" class="lunch">LUNCH</th>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
        <td rowspan="2">Project</td>
    </tr>

    <tr>
        <td>Science</td>
        <td>Maths</td>
        <td>Science</td>
        <td>Maths</td>
    </tr>

</table>

</body>
</html>
